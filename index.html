<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AQI Device Data</title>

<style>

body{
margin:0;
background:black;
font-family:Arial, Helvetica, sans-serif;
color:white;
overflow:hidden;
}

/* FULL SCREEN FRAME */
.frame{
width:98vw;
height:98vh;
margin:auto;
border:6px solid white;
box-sizing:border-box;
display:flex;
flex-direction:column;
}

/* CLIENT NAME BAR */
.header{
height:10%;
border-bottom:4px solid white;
display:flex;
align-items:center;
overflow:hidden;
position:relative;
}

/* SLIDING TEXT */
#clientName{
position:absolute;
white-space:nowrap;
font-size:4vw;
font-weight:bold;
animation:slide 15s linear infinite;
}

@keyframes slide{
0%{left:100%;}
100%{left:-100%;}
}

/* TABLE AREA */
.dataArea{
flex:1;
display:flex;
flex-direction:column;
}

table{
width:100%;
height:100%;
border-collapse:collapse;
table-layout:fixed;
}

th,td{
border:2px solid white;
text-align:center;
font-size:2.3vw;
padding:10px;
}

th{
background:#111;
}

/* LAST ROW HEIGHT FIX */
tbody tr{
height:33%;
}

</style>
</head>

<body>

<div class="frame">

<div class="header">
<div id="clientName">Loading...</div>
</div>

<div class="dataArea">

<table>

<thead>
<tr>
<th>Parameter</th>
<th>Value</th>
<th>Status</th>
</tr>
</thead>

<tbody>

<tr>
<td>PM2.5</td>
<td id="pm25">--</td>
<td id="pm25s">--</td>
</tr>

<tr>
<td>PM10</td>
<td id="pm10">--</td>
<td id="pm10s">--</td>
</tr>

<tr>
<td>AQI</td>
<td id="aqi">--</td>
<td id="aqis">--</td>
</tr>

</tbody>

</table>

</div>
</div>

<script>

/* READ URL PARAMETERS */
const params = new URLSearchParams(window.location.search);
const client = params.get("client") || "AQI DEVICE";
const device = params.get("device") || "1";

/* SET CLIENT NAME */
document.getElementById("clientName").innerText = client;


/* API DATA FETCH (CHANGE API IF NEEDED) */

async function loadData(){

try{

let url="https://api.thingspeak.com/channels/"+device+"/feeds.json?results=1";

let res = await fetch(url);
let data = await res.json();

let feed = data.feeds[0];

document.getElementById("pm25").innerText = feed.field1 || "--";
document.getElementById("pm10").innerText = feed.field2 || "--";
document.getElementById("aqi").innerText = feed.field3 || "--";

}
catch(e){
console.log(e);
}

}

loadData();

/* AUTO REFRESH */
setInterval(loadData,10000);

</script>

</body>
</html>
