<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AQI LED Display</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

/* MAIN FRAME */

.container{
width:100vw;
height:100vh;
box-sizing:border-box;
display:flex;
flex-direction:column;
}

/* CLIENT NAME */

.header{
height:14%;
display:flex;
align-items:center;
justify-content:center;
color:#00ff66;
font-size:5vw;
font-weight:bold;
border-bottom:1px solid #00aaff;
text-align:center;
letter-spacing:2px;
}

/* DATE TIME */

.datetime{
height:10%;
display:grid;
grid-template-columns:1fr 1fr;
border-bottom:1px solid #00aaff;
}

.date,.time{
display:flex;
align-items:center;
justify-content:center;
font-size:2.5vw;
color:white;
border-right:1px solid #00aaff;
}

.time{
border-right:none;
}

/* DATA TABLE */

.data{
flex:1;
display:grid;
grid-template-columns:1fr 1fr 1fr;
grid-template-rows:repeat(5,1fr);
}

/* CELL */

.cell{
display:flex;
align-items:center;
justify-content:center;
border:1px solid #00aaff;
}

/* COLUMN STYLES */

.label{
color:#ff66ff;
font-size:3vw;
font-weight:bold;
}

.value{
color:#ffcc00;
font-size:4vw;
font-weight:normal;
}

.unit{
color:#00ffff;
font-size:2.6vw;
font-weight:normal;
}

</style>

</head>

<body>

<div class="container">

<div class="header" id="clientName">
AQI DISPLAY
</div>

<div class="datetime">
<div class="date" id="date"></div>
<div class="time" id="time"></div>
</div>

<div class="data">

<div class="cell label">PM2.5</div>
<div class="cell value" id="pm25">--</div>
<div class="cell unit">µg/m³</div>

<div class="cell label">TEMP</div>
<div class="cell value" id="temp">--</div>
<div class="cell unit">DegC</div>

<div class="cell label">HUM</div>
<div class="cell value" id="hum">--</div>
<div class="cell unit">%</div>

<div class="cell label">PM10</div>
<div class="cell value" id="pm10">--</div>
<div class="cell unit">µg/m³</div>

<div class="cell label">AQI</div>
<div class="cell value" id="aqi">--</div>
<div class="cell unit">Index</div>

</div>

</div>

<script>

/* URL PARAMETERS */

const params = new URLSearchParams(window.location.search)

const device = params.get("device") || "11"
let name = params.get("name") || "AQI DISPLAY"

name = decodeURIComponent(name)

document.getElementById("clientName").innerText = name

/* DATE TIME */

function updateTime(){

const now = new Date()

document.getElementById("date").innerText =
now.toLocaleDateString()

document.getElementById("time").innerText =
now.toLocaleTimeString()

}

/* FETCH DATA */

async function fetchData(){

try{

const response = await fetch(
"https://aqi.rudraenterpriseshansi.workers.dev/?device="+device
)

const data = await response.json()

const p = data.parameter

document.getElementById("pm25").innerText = p.pm25.value
document.getElementById("temp").innerText = p.temperature.value
document.getElementById("hum").innerText = p.humidity.value
document.getElementById("pm10").innerText = p.pm10.value
document.getElementById("aqi").innerText = p.aqi.value

}catch(e){

console.log("API ERROR",e)

}

}

setInterval(updateTime,1000)
setInterval(fetchData,20000)

updateTime()
fetchData()

</script>

</body>
</html>
